<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa de Un Minisplit Inverter Frio/Calor de 1 Tonelada Marca Prime</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <h1>🎟️ RIFA MINISPLIT PRIME - 1 TONELADA - FRIO/CALOR</h1>
        <p class="subtitle">Participa y gana increíble premio</p>
    </header>

    <section class="card-premio">
        <img src="FotoClimaPrimeRifa.PNG" alt="Premio Rifa">

        <div class="info-rifa">
            <div class="info-item">
                <span>📅 Fecha Sorteo:<strong> 30 Junio 2026</strong></span>               
            </div>

            <div class="info-item">
                <span>💰 Precio Boleto:<strong> $100 MXN</strong></span>                
            </div>

            <div class="info-item">
                <span>🎟️ Disponibles: <strong id="boletosDisponibles">100</strong></span>               
            </div>
        </div>
    </section>

    <section class="boletos-section">
        <h2>Selecciona tu boleto</h2>

        <div id="boletosContainer" class="boletos-grid"></div>
    </section>

    <section class="formulario-section">
        <h2>Reservar boleto</h2>

        <form id="formReserva">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label>Celular</label>
                <input type="tel" id="telefono" required>
            </div>

            <div class="form-group">
                <label>Boleto Seleccionado</label>
                <input type="text" id="boletoSeleccionado" readonly>
            </div>

            <div class="form-group">
                <label>Comprobante de Pago</label>
                <input type="file" id="comprobante">
            </div>

            <button type="submit" class="btn-reservar">
                Reservar Boleto
            </button>

        </form>
    </section>

    <section class="mensaje-section">
        <div id="mensaje"></div>
    </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
